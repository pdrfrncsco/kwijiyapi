services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       kwijiya_db
      POSTGRES_USER:     kwijiya_user
      POSTGRES_PASSWORD: "Gc)0vmwYNT)#4g*D"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kwijiya_user -d kwijiya_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    volumes:
      - .:/app                                      # código
      - ./staticfiles:/app/staticfiles              # ← bind mount directo para o host
      - ./media:/app/media                          # ← idem para media
    ports:
      - "8005:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
